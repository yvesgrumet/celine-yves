<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dépenses — Céline & Yves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mauve:#9b6fc4;--mauve-f:#6a2fa0;--mauve-pale:#f0e8f9;--mauve-mid:#d4b8ef;
  --bleu:#3a6bbf;--bleu-pale:#e8eef9;
  --vert:#2e7d52;--vert-pale:#e6f4ec;
  --rouge:#c0392b;--rouge-pale:#fde8e8;
  --or:#c9963a;--or-pale:#fdf4e3;
  --texte:#2a1a3e;--gris:#6b5d7a;--gris-pale:#f2edf8;
  --blanc:#fff;--fond:#f7f2fc;--radius:14px;
  --shadow:0 2px 16px rgba(120,80,180,.10);
}
html,body{
  height:100%;font-family:'DM Sans',sans-serif;
  background:var(--fond);color:var(--texte);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  max-width:480px;margin:0 auto;padding-bottom:80px;overflow-x:hidden;
}
.header{background:linear-gradient(135deg,#6a2fa0,#9b6fc4 60%,#c9a8e8);color:#fff;padding:18px 20px 16px;display:flex;align-items:center;gap:12px;}
.header a{color:#fff;text-decoration:none;font-size:22px;}
.header-titre{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1;}
.header-titre span{font-size:13px;font-weight:400;opacity:.75;display:block;}
.mois-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--blanc);border-bottom:1px solid var(--mauve-pale);}
.mois-nav button{background:var(--mauve-pale);border:none;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer;color:var(--mauve-f);display:flex;align-items:center;justify-content:center;}
#mois-titre{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
.section{background:var(--blanc);margin:12px 12px 0;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.section-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px;border-bottom:1px solid var(--mauve-pale);}
.section-titre{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.section-body{padding:12px 16px 14px;}
/* BILAN */
.bilan-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.bilan-carte{background:var(--gris-pale);border-radius:10px;padding:10px;text-align:center;}
.bilan-carte-label{font-size:11px;color:var(--gris);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.bilan-carte-val{font-size:17px;font-weight:700;color:var(--texte);margin-top:2px;}
.bilan-carte.total .bilan-carte-val{color:var(--mauve-f);font-size:19px;}
.bilan-carte.celine .bilan-carte-val{color:var(--bleu);}
.bilan-carte.yves .bilan-carte-val{color:var(--vert);}
.bilan-eq{border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.6;}
.bilan-eq.rouge{background:var(--rouge-pale);color:var(--rouge);}
.bilan-eq.vert{background:var(--vert-pale);color:var(--vert);}
.bilan-eq.neutre{background:var(--gris-pale);color:var(--gris);}
.cat-barre-ligne{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.cat-barre-label{font-size:12px;color:var(--texte);min-width:110px;}
.cat-barre-track{flex:1;height:7px;background:var(--gris-pale);border-radius:4px;overflow:hidden;}
.cat-barre-fill{height:100%;border-radius:4px;transition:width .3s;}
.cat-barre-mt{font-size:12px;font-weight:600;min-width:60px;text-align:right;}
/* REVENUS */
.rev-personne{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--mauve-pale);}
.rev-personne:last-of-type{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.rev-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.rev-nom{font-size:15px;font-weight:700;min-width:56px;}
.rev-nom.c{color:var(--bleu);}
.rev-nom.y{color:var(--vert);}
.rev-montant{font-size:18px;font-weight:700;flex:1;}
.rev-montant.c{color:var(--bleu);}
.rev-montant.y{color:var(--vert);}
.rev-pct{font-size:13px;font-weight:700;padding:3px 10px;border-radius:10px;background:var(--mauve-pale);color:var(--mauve-f);}
.rev-edit-btn{background:none;border:1.5px solid var(--mauve-mid);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--mauve-f);cursor:pointer;}
.rev-input-zone{display:none;align-items:center;gap:6px;margin-top:6px;}
.rev-input-zone input{flex:1;padding:8px 12px;border-radius:10px;border:1.5px solid var(--mauve-mid);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--blanc);}
.rev-input-zone button{padding:8px 14px;border-radius:10px;border:none;background:var(--mauve);color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.rev-barre-wrap{margin-top:10px;}
.rev-barre-container{height:10px;background:var(--gris-pale);border-radius:5px;overflow:hidden;display:flex;}
.rev-barre-c{background:var(--bleu);height:100%;transition:width .4s;}
.rev-barre-y{background:var(--vert);height:100%;transition:width .4s;}
.rev-legende{display:flex;justify-content:space-between;margin-top:4px;}
.rev-leg{font-size:11px;font-weight:600;}
.rev-leg.c{color:var(--bleu);}
.rev-leg.y{color:var(--vert);}
.rev-diff{margin-top:8px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;text-align:center;line-height:1.5;}
.rev-diff.eq{background:var(--vert-pale);color:var(--vert);}
.rev-diff.diff{background:var(--mauve-pale);color:var(--mauve-f);}
/* HISTORIQUE */
.hist-date-h{font-size:11px;font-weight:700;color:var(--mauve-f);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 4px;border-bottom:1px solid var(--mauve-pale);margin-bottom:4px;}
.hist-item{display:flex;align-items:stretch;gap:8px;padding:8px 0;border-bottom:1px solid #f5f2fa;}
.hist-item:last-child{border-bottom:none;}
.hist-barre{width:3px;min-width:3px;border-radius:2px;flex-shrink:0;}
.hist-corps{flex:1;min-width:0;}
.hist-l1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.hist-titre{font-size:14px;font-weight:600;color:var(--texte);}
.hist-mt{font-size:14px;font-weight:700;color:var(--mauve-f);white-space:nowrap;}
.hist-l2{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;align-items:center;}
.hist-cat{font-size:11px;color:var(--gris);}
.hist-pay{font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;}
.hist-pay.pc{background:var(--bleu-pale);color:var(--bleu);}
.hist-pay.py{background:var(--vert-pale);color:var(--vert);}
.hist-note{font-size:11px;color:var(--gris);font-style:italic;}
.hist-act{display:flex;flex-direction:column;gap:2px;justify-content:center;flex-shrink:0;}
.btn-icon{background:none;border:none;cursor:pointer;font-size:15px;padding:4px;border-radius:6px;transition:background .15s;}
.btn-icon:active{background:var(--mauve-pale);}
/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,26,62,.55);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal{background:var(--blanc);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 36px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-hdr-titre{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.modal-close{background:var(--gris-pale);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gris);}
.form-row{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gris);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.form-input{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--mauve-mid);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--texte);background:var(--blanc);outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--mauve);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.payeur-toggle{display:flex;gap:8px;}
.payeur-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--mauve-mid);background:var(--blanc);font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.payeur-btn.ac{background:var(--bleu);border-color:var(--bleu);color:#fff;}
.payeur-btn.ay{background:var(--vert);border-color:var(--vert);color:#fff;}
.sous-cat-ligne{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--or-pale);border-radius:8px;border:1px solid #f0d090;}
.sous-cat-ligne input[type=checkbox]{width:16px;height:16px;accent-color:var(--or);}
.sous-cat-ligne label{font-size:13px;color:#7a5500;font-weight:500;}
.btn-sauver{width:100%;padding:14px;margin-top:8px;background:linear-gradient(135deg,var(--mauve-f),var(--mauve));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;}
.btn-sauver:active{opacity:.85;}
#undo-bar{display:none;position:fixed;bottom:88px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#2a1a3e;color:#fff;border-radius:12px;padding:12px 16px;z-index:300;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.25);}
#undo-bar span{font-size:13px;}
#undo-bar button{background:var(--mauve-pale);border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--mauve-f);cursor:pointer;}
.fab{position:fixed;bottom:80px;right:20px;width:54px;height:54px;background:linear-gradient(135deg,#9b6fc4,#6a2fa0);border-radius:50%;border:none;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(155,111,196,.5);cursor:pointer;z-index:99;transition:transform .2s;-webkit-tap-highlight-color:transparent;}
.fab:active{transform:scale(.93);}
.nav-bas{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--blanc);border-top:1px solid #e8e0f5;display:flex;justify-content:space-around;padding:8px 0 12px;z-index:100;box-shadow:0 -2px 16px rgba(120,80,180,.07);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--gris);font-size:10px;font-weight:500;padding:4px 8px;border-radius:10px;transition:color .2s,background .2s;-webkit-tap-highlight-color:transparent;}
.nav-item.actif,.nav-item:active{color:var(--mauve-f);background:var(--mauve-pale);}
.nav-item svg{width:22px;height:22px;stroke-width:1.7;}
.rien{font-size:13px;color:var(--gris);text-align:center;padding:12px 0;font-style:italic;}
</style>
</head>
<body>

<header class="header">
  <a href="index.html">←</a>
  <div class="header-titre">Dépenses<span>Céline & Yves</span></div>
  <button onclick="ouvrirFormulaire()" style="background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">+</button>
</header>

<div class="mois-nav">
  <button onclick="moisPrec()">‹</button>
  <span id="mois-titre"></span>
  <button onclick="moisSuiv()">›</button>
</div>

<section class="section">
  <div class="section-header"><span class="section-titre">📊 Bilan du mois</span></div>
  <div class="section-body">
    <div class="bilan-grid">
      <div class="bilan-carte total"><div class="bilan-carte-label">Total</div><div class="bilan-carte-val" id="bilan-total">0,00 €</div></div>
      <div class="bilan-carte celine"><div class="bilan-carte-label">Céline</div><div class="bilan-carte-val" id="bilan-celine">0,00 €</div></div>
      <div class="bilan-carte yves"><div class="bilan-carte-label">Yves</div><div class="bilan-carte-val" id="bilan-yves">0,00 €</div></div>
    </div>
    <div id="bilan-eq" style="display:none"></div>
    <div id="bilan-cats"></div>
  </div>
</section>

<section class="section">
  <div class="section-header"><span class="section-titre">💰 Revenus mensuels</span></div>
  <div class="section-body">
    <div class="rev-personne">
      <div class="rev-top">
        <span class="rev-nom c">Céline</span>
        <span class="rev-montant c" id="disp-c">— €</span>
        <span class="rev-pct" id="pct-c">—%</span>
        <button class="rev-edit-btn" onclick="toggleRev('celine')">✏️ Saisir</button>
      </div>
      <div class="rev-input-zone" id="zone-c">
        <input type="number" id="inp-c" step="1" min="0" placeholder="Ex : 2500 €/mois" class="form-input">
        <button onclick="sauverRev('celine')">✓ OK</button>
      </div>
    </div>
    <div class="rev-personne">
      <div class="rev-top">
        <span class="rev-nom y">Yves</span>
        <span class="rev-montant y" id="disp-y">— €</span>
        <span class="rev-pct" id="pct-y">—%</span>
        <button class="rev-edit-btn" onclick="toggleRev('yves')">✏️ Saisir</button>
      </div>
      <div class="rev-input-zone" id="zone-y">
        <input type="number" id="inp-y" step="1" min="0" placeholder="Ex : 2000 €/mois" class="form-input">
        <button onclick="sauverRev('yves')">✓ OK</button>
      </div>
    </div>
    <div class="rev-barre-wrap">
      <div class="rev-barre-container">
        <div class="rev-barre-c" id="bar-c" style="width:50%"></div>
        <div class="rev-barre-y" id="bar-y" style="width:50%"></div>
      </div>
      <div class="rev-legende">
        <span class="rev-leg c" id="leg-c">Céline —%</span>
        <span class="rev-leg y" id="leg-y">Yves —%</span>
      </div>
      <div class="rev-diff" id="rev-diff" style="display:none"></div>
    </div>
  </div>
</section>

<section class="section">
  <div class="section-header"><span class="section-titre">📋 Dépenses du mois</span></div>
  <div class="section-body"><div id="hist"><p class="rien">Chargement…</p></div></div>
</section>

<div id="undo-bar"><span>Dépense supprimée</span><button onclick="annulerSuppr()">↩ Annuler</button></div>

<div id="modal-overlay" onclick="if(event.target===this)fermerModal()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-hdr-titre" id="form-titre">Nouvelle dépense</span>
      <button class="modal-close" onclick="fermerModal()">✕</button>
    </div>
    <div class="form-row">
      <label class="form-label">Titre *</label>
      <input id="dep-titre" class="form-input" type="text" placeholder="Ex : Leclerc, Médecin…">
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Montant (€) *</label>
        <input id="dep-mt" class="form-input" type="number" step="0.01" min="0" placeholder="0,00">
      </div>
      <div>
        <label class="form-label">Date *</label>
        <input id="dep-date" class="form-input" type="date">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Catégorie</label>
      <select id="dep-cat" class="form-input" onchange="majSousCat()">
        <option value="courses">🛒 Courses</option>
        <option value="restaurant">🍽️ Restaurant</option>
        <option value="sante">🏥 Santé</option>
        <option value="loisirs">🎭 Loisirs</option>
        <option value="vetements">👗 Vêtements</option>
        <option value="maison">🏠 Maison</option>
        <option value="deplacement">🚗 Déplacement</option>
        <option value="enfants">👶 Enfants</option>
        <option value="abonnements">📱 Abonnements</option>
        <option value="vacances">🏖️ Vacances</option>
        <option value="autre">✏️ Autre</option>
      </select>
    </div>
    <div class="form-row" id="sc-row" style="display:none">
      <div class="sous-cat-ligne">
        <input type="checkbox" id="sc-ess">
        <label for="sc-ess">⛽ C'est de l'essence — classer en "Essence"</label>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Qui a payé ?</label>
      <div class="payeur-toggle">
        <button type="button" class="payeur-btn ac" id="btn-c" onclick="setPayeur('Céline')">Céline</button>
        <button type="button" class="payeur-btn"    id="btn-y" onclick="setPayeur('Yves')">Yves</button>
      </div>
      <input type="hidden" id="dep-pay" value="Céline">
    </div>
    <div class="form-row">
      <label class="form-label" id="note-lbl">Note (optionnelle)</label>
      <textarea id="dep-note" class="form-input" rows="2" style="resize:none" placeholder="Magasin, détails…"></textarea>
    </div>
    <button class="btn-sauver" onclick="sauvegarderDep()">💾 Enregistrer</button>
  </div>
</div>

/* Feedback anti double-clic */
function feedbackSauvegarde(callback) {
  var btn = document.querySelector('.btn-sauver');
  if (btn && btn.disabled) return false;
  if (btn) { btn.disabled=true; btn.innerHTML='✅ Enregistré !'; btn.style.background='#2e7d52'; }
  setTimeout(function(){ callback(); }, 900);
  return true;
}


/* ── Catégories ──────────────────────────── */
var CATS = [
  {v:"courses",l:"🛒 Courses",c:"#6f9bc4"},{v:"restaurant",l:"🍽️ Restaurant",c:"#c49b6f"},
  {v:"sante",l:"🏥 Santé",c:"#c46f6f"},{v:"loisirs",l:"🎭 Loisirs",c:"#9b6fc4"},
  {v:"vetements",l:"👗 Vêtements",c:"#c46f9b"},{v:"maison",l:"🏠 Maison",c:"#6fc49b"},
  {v:"deplacement",l:"🚗 Déplacement",c:"#c4a46f"},{v:"essence",l:"⛽ Essence",c:"#a4826f"},
  {v:"enfants",l:"👶 Enfants",c:"#c4c46f"},{v:"abonnements",l:"📱 Abonnements",c:"#6fc4c4"},
  {v:"vacances",l:"🏖️ Vacances",c:"#7a6fc4"},{v:"autre",l:"✏️ Autre",c:"#888"}
];
function colCat(v){return(CATS.find(function(c){return c.v===v;})||{c:"#888"}).c;}
function lblCat(v){return(CATS.find(function(c){return c.v===v;})||{l:v}).l;}
function eur(n){return parseFloat(n||0).toFixed(2)+" €";}

/* ── État ────────────────────────────────── */
var allDeps={}, famille={}, editKey=null, lastDel=null;
var moisFiltre=new Date().toISOString().slice(0,7);
var MOIS_NOMS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
var JOURS_C=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
var MOIS_C=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];

/* ── Listeners Firebase ──────────────────── */
db.ref("depenses").on("value",function(s){allDeps=s.val()||{};renderBilan();renderHist();});
db.ref("famille").on("value",function(s){famille=s.val()||{};renderRevs();renderBilan();});

/* ── Navigation mois ─────────────────────── */
function majTitre(){
  var p=moisFiltre.split("-");
  document.getElementById("mois-titre").textContent=MOIS_NOMS[parseInt(p[1])-1]+" "+p[0];
}
function moisPrec(){var d=new Date(moisFiltre+"-01");d.setMonth(d.getMonth()-1);moisFiltre=d.toISOString().slice(0,7);majTitre();renderBilan();renderHist();}
function moisSuiv(){var d=new Date(moisFiltre+"-01");d.setMonth(d.getMonth()+1);moisFiltre=d.toISOString().slice(0,7);majTitre();renderBilan();renderHist();}

/* ── Revenus ─────────────────────────────── */
function renderRevs(){
  var rc=parseFloat((famille.celine||{}).revenu||0);
  var ry=parseFloat((famille.yves||{}).revenu||0);
  var tot=rc+ry;
  document.getElementById("disp-c").textContent=rc>0?rc.toFixed(0)+" €":"— €";
  document.getElementById("disp-y").textContent=ry>0?ry.toFixed(0)+" €":"— €";
  if(tot>0){
    var pc=Math.round(rc/tot*100), py=100-pc;
    document.getElementById("pct-c").textContent=pc+"%";
    document.getElementById("pct-y").textContent=py+"%";
    document.getElementById("bar-c").style.width=pc+"%";
    document.getElementById("bar-y").style.width=py+"%";
    document.getElementById("leg-c").textContent="Céline "+pc+"%";
    document.getElementById("leg-y").textContent="Yves "+py+"%";
    var diff=Math.abs(pc-py);
    var bloc=document.getElementById("rev-diff");
    bloc.style.display="block";
    if(diff===0){
      bloc.className="rev-diff eq";
      bloc.textContent="✅ Revenus équilibrés — contribution égale (50 / 50)";
    } else {
      var plus=pc>py?"Céline":"Yves", moins=pc>py?"Yves":"Céline";
      bloc.className="rev-diff diff";
      bloc.innerHTML=plus+" gagne <strong>"+diff+"%</strong> de plus que "+moins+"<br>Contribution idéale : Céline <strong>"+pc+"%</strong> · Yves <strong>"+py+"%</strong>";
    }
  } else {
    document.getElementById("pct-c").textContent="—%";
    document.getElementById("pct-y").textContent="—%";
    document.getElementById("bar-c").style.width="50%";
    document.getElementById("bar-y").style.width="50%";
    document.getElementById("leg-c").textContent="Céline —%";
    document.getElementById("leg-y").textContent="Yves —%";
    document.getElementById("rev-diff").style.display="none";
  }
}
function toggleRev(qui){
  var id=qui==="celine"?"c":"y";
  var zone=document.getElementById("zone-"+id);
  var inp=document.getElementById("inp-"+id);
  var key=qui;
  var rev=parseFloat((famille[key]||{}).revenu||0);
  if(zone.style.display==="flex"){zone.style.display="none";}
  else{inp.value=rev>0?rev:"";zone.style.display="flex";inp.focus();}
}
function sauverRev(qui){
  var id=qui==="celine"?"c":"y";
  var inp=document.getElementById("inp-"+id);
  var val=parseFloat(inp.value);
  if(isNaN(val)||val<0){alert("Montant invalide");return;}
  // Mise à jour locale immédiate
  if(!famille[qui])famille[qui]={};
  famille[qui].revenu=val;
  renderRevs();
  renderBilan();
  document.getElementById("zone-"+id).style.display="none";
  // Puis sauvegarde Firebase
  db.ref("famille/"+qui).update({revenu:val});
}

/* ── Bilan ───────────────────────────────── */
function depsDuMois(){
  return Object.entries(allDeps).filter(function(e){
    return !e[1].supprime&&(e[1].date||"").startsWith(moisFiltre);
  }).map(function(e){return Object.assign({key:e[0]},e[1]);});
}
function renderBilan(){
  var deps=depsDuMois();
  var total=deps.reduce(function(s,d){return s+parseFloat(d.montant||0);},0);
  var partC=deps.filter(function(d){return d.payeur==="Céline";}).reduce(function(s,d){return s+parseFloat(d.montant||0);},0);
  var partY=total-partC;
  document.getElementById("bilan-total").textContent=eur(total);
  document.getElementById("bilan-celine").textContent=eur(partC);
  document.getElementById("bilan-yves").textContent=eur(partY);
  var rc=parseFloat((famille.celine||{}).revenu||0);
  var ry=parseFloat((famille.yves||{}).revenu||0);
  var rt=rc+ry;
  var eq=document.getElementById("bilan-eq");
  if(total>0&&rt>0){
    var idealC=total*(rc/rt);
    var diff=partC-idealC;
    var adiff=Math.abs(diff);
    eq.style.display="block";
    if(adiff<0.5){eq.className="bilan-eq vert";eq.textContent="✅ Parts équilibrées selon vos revenus ce mois";}
    else{
      var trop=diff>0?"Céline":"Yves",doit=diff>0?"Yves":"Céline";
      var pcT=Math.round((diff>0?rc:ry)/rt*100);
      eq.className="bilan-eq rouge";
      eq.innerHTML="<strong>"+trop+"</strong> a payé <strong>"+adiff.toFixed(2)+" €</strong> de plus que sa part ("+pcT+"%)<br>→ <strong>"+doit+"</strong> devrait rembourser <strong>"+adiff.toFixed(2)+" €</strong>";
    }
  } else if(total>0){eq.style.display="block";eq.className="bilan-eq neutre";eq.textContent="Renseignez vos revenus pour voir l'équilibre";}
  else{eq.style.display="none";}
  var parCat={};
  deps.forEach(function(d){var c=d.categorie||"autre";parCat[c]=(parCat[c]||0)+parseFloat(d.montant||0);});
  var sorted=Object.entries(parCat).sort(function(a,b){return b[1]-a[1];});
  document.getElementById("bilan-cats").innerHTML=sorted.length===0?"":sorted.map(function(e){
    var pct=total>0?Math.round(e[1]/total*100):0;
    return '<div class="cat-barre-ligne"><span class="cat-barre-label">'+lblCat(e[0])+'</span><div class="cat-barre-track"><div class="cat-barre-fill" style="width:'+pct+'%;background:'+colCat(e[0])+'"></div></div><span class="cat-barre-mt">'+eur(e[1])+'</span></div>';
  }).join("");
}

/* ── Historique ──────────────────────────── */
function renderHist(){
  var deps=Object.entries(allDeps).filter(function(e){return !e[1].supprime&&(e[1].date||"").startsWith(moisFiltre);}).sort(function(a,b){return b[1].date.localeCompare(a[1].date);});
  var el=document.getElementById("hist");
  if(deps.length===0){el.innerHTML='<p class="rien">Aucune dépense ce mois-ci</p>';return;}
  var html="",lastDate="";
  deps.forEach(function(e){
    var key=e[0],d=e[1];
    if(d.date!==lastDate){
      var dt=new Date(d.date+"T12:00");
      html+='<div class="hist-date-h">'+JOURS_C[dt.getDay()]+" "+dt.getDate()+" "+MOIS_C[dt.getMonth()]+'</div>';
      lastDate=d.date;
    }
    var pc=d.payeur==="Céline"?"pc":"py";
    html+='<div class="hist-item"><div class="hist-barre" style="background:'+colCat(d.categorie)+'"></div><div class="hist-corps"><div class="hist-l1"><span class="hist-titre">'+(d.titre||"—")+'</span><span class="hist-mt">'+eur(d.montant)+'</span></div><div class="hist-l2"><span class="hist-cat">'+lblCat(d.categorie)+'</span><span class="hist-pay '+pc+'">'+d.payeur+'</span>'+(d.note?'<span class="hist-note">'+d.note+'</span>':'')+'</div></div><div class="hist-act"><button class="btn-icon" onclick="ouvrirEdition(\''+key+'\')">✏️</button><button class="btn-icon" onclick="supprimerDep(\''+key+'\')">🗑️</button></div></div>';
  });
  el.innerHTML=html;
}

/* ── Formulaire ──────────────────────────── */
function ouvrirFormulaire(){
  editKey=null;
  document.getElementById("form-titre").textContent="Nouvelle dépense";
  document.getElementById("dep-titre").value="";
  document.getElementById("dep-mt").value="";
  document.getElementById("dep-date").value=new Date().toISOString().slice(0,10);
  document.getElementById("dep-cat").value="courses";
  document.getElementById("dep-note").value="";
  document.getElementById("sc-ess").checked=false;
  setPayeur("Céline");
  majSousCat();
  document.getElementById("modal-overlay").style.display="flex";
}
function ouvrirEdition(key){
  var d=allDeps[key];if(!d)return;
  editKey=key;
  document.getElementById("form-titre").textContent="Modifier la dépense";
  document.getElementById("dep-titre").value=d.titre||"";
  document.getElementById("dep-mt").value=d.montant||"";
  document.getElementById("dep-date").value=d.date||"";
  var cat=d.categorie==="essence"?"deplacement":(d.categorie||"autre");
  document.getElementById("dep-cat").value=cat;
  document.getElementById("sc-ess").checked=d.categorie==="essence";
  document.getElementById("dep-note").value=d.note||"";
  setPayeur(d.payeur||"Céline");
  majSousCat();
  document.getElementById("modal-overlay").style.display="flex";
}
function fermerModal(){document.getElementById("modal-overlay").style.display="none";editKey=null;}
function majSousCat(){
  var cat=document.getElementById("dep-cat").value;
  document.getElementById("sc-row").style.display=cat==="deplacement"?"block":"none";
  document.getElementById("note-lbl").textContent=cat==="autre"?"Précision *":"Note (optionnelle)";
}
function setPayeur(p){
  document.getElementById("dep-pay").value=p;
  document.getElementById("btn-c").className="payeur-btn"+(p==="Céline"?" ac":"");
  document.getElementById("btn-y").className="payeur-btn"+(p==="Yves"?" ay":"");
}
function sauvegarderDep(){
  var btn=document.querySelector(".btn-sauver");
  if(btn&&btn.disabled)return;
  var titre=document.getElementById("dep-titre").value.trim();
  var montant=parseFloat(document.getElementById("dep-mt").value);
  var date=document.getElementById("dep-date").value;
  if(!titre){alert("Le titre est obligatoire");return;}
  if(isNaN(montant)||montant<=0){alert("Montant invalide");return;}
  if(!date){alert("La date est obligatoire");return;}
  var cat=document.getElementById("dep-cat").value;
  if(cat==="deplacement"&&document.getElementById("sc-ess").checked)cat="essence";
  var data={titre:titre,montant:montant,date:date,categorie:cat,
    payeur:document.getElementById("dep-pay").value,
    note:document.getElementById("dep-note").value.trim()||null,
    modifiedAt:new Date().toISOString(),supprime:false};
  if(editKey){
    // Mise à jour locale immédiate
    allDeps[editKey]=Object.assign(allDeps[editKey]||{},data);
    db.ref("depenses/"+editKey).update(data);
  } else {
    data.createdAt=new Date().toISOString();
    var newRef=db.ref("depenses").push();
    allDeps[newRef.key]=data;
    newRef.set(data);
  }
  fermerModal();
  renderBilan();
  renderHist();
}

/* ── Suppression + undo ──────────────────── */
function supprimerDep(key){
  var d=allDeps[key];if(!d)return;
  lastDel={key:key,data:Object.assign({},d)};
  // Mise à jour locale immédiate
  allDeps[key].supprime=true;
  renderBilan();
  renderHist();
  db.ref("depenses/"+key).update({supprime:true,suppressAt:new Date().toISOString()});
  var bar=document.getElementById("undo-bar");
  bar.style.display="flex";
  clearTimeout(window._ut);
  window._ut=setTimeout(function(){bar.style.display="none";lastDel=null;},6000);
}
function annulerSuppr(){
  if(!lastDel)return;
  allDeps[lastDel.key].supprime=false;
  renderBilan();
  renderHist();
  db.ref("depenses/"+lastDel.key).update({supprime:false,suppressAt:null});
  document.getElementById("undo-bar").style.display="none";
  lastDel=null;
}

/* ── Init ────────────────────────────────── */
majTitre();
</script>
</body>
</html>
