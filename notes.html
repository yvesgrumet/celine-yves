<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Notes — Céline & Yves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mauve:#9b6fc4;--mauve-f:#6a2fa0;--mauve-pale:#f0e8f9;--mauve-mid:#d4b8ef;
  --or:#c9963a;--or-pale:#fdf4e3;--or-mid:#f0d080;
  --vert:#2e7d52;--vert-pale:#e6f4ec;
  --rouge:#c0392b;--rouge-pale:#fde8e8;
  --texte:#2a1a3e;--gris:#6b5d7a;--gris-pale:#f2edf8;
  --blanc:#fff;--fond:#f7f2fc;--radius:14px;
  --shadow:0 2px 16px rgba(120,80,180,.10);
}
html,body{
  height:100%;font-family:'DM Sans',sans-serif;
  background:var(--fond);color:var(--texte);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  max-width:480px;margin:0 auto;padding-bottom:80px;overflow-x:hidden;
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#6a2fa0,#9b6fc4 60%,#c9a8e8);
  color:#fff;padding:18px 20px 16px;
  display:flex;align-items:center;gap:12px;
}
.header a{color:#fff;text-decoration:none;font-size:22px;}
.header-titre{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;flex:1;}
.header-titre span{font-size:13px;font-weight:400;opacity:.75;display:block;}
.header-btn{
  background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:36px;height:36px;color:#fff;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* FILTRES */
.filtres{
  display:flex;gap:8px;padding:12px 12px 0;
  overflow-x:auto;scrollbar-width:none;
}
.filtres::-webkit-scrollbar{display:none;}
.filtre-btn{
  white-space:nowrap;padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--mauve-mid);background:var(--blanc);
  color:var(--gris);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.filtre-btn.actif{background:var(--mauve);border-color:var(--mauve);color:#fff;font-weight:700;}
.filtre-btn.imp.actif{background:var(--or);border-color:var(--or);color:#fff;}

/* NOTES LISTE */
.notes-liste{padding:12px;}

/* CARTE NOTE */
.note-carte{
  background:var(--blanc);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px;
  overflow:hidden;transition:transform .15s;
  border-left:4px solid var(--mauve);
}
.note-carte.importante{border-left-color:var(--or);}
.note-carte:active{transform:scale(.99);}

.note-header{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px 8px;
}
.note-icone{font-size:18px;flex-shrink:0;margin-top:1px;}
.note-info{flex:1;min-width:0;}
.note-titre-ligne{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.note-titre{
  font-size:15px;font-weight:700;color:var(--texte);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.badge-imp{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;
  background:var(--or-pale);color:var(--or);border:1px solid var(--or-mid);
  flex-shrink:0;
}
.note-date{font-size:11px;color:var(--gris);margin-top:2px;}
.note-actions{display:flex;gap:4px;flex-shrink:0;}
.btn-icon{
  background:none;border:none;cursor:pointer;
  font-size:16px;padding:5px;border-radius:8px;
  transition:background .15s;-webkit-tap-highlight-color:transparent;
}
.btn-icon:active{background:var(--mauve-pale);}

.note-contenu{
  font-size:14px;color:var(--texte);line-height:1.65;
  padding:0 14px 12px;white-space:pre-wrap;word-break:break-word;
}
.note-contenu.tronque{
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;white-space:normal;
}
.note-lire-plus{
  display:block;font-size:12px;color:var(--mauve-f);
  padding:0 14px 10px;cursor:pointer;background:none;border:none;
  text-align:left;font-family:'DM Sans',sans-serif;
}

/* VIDE */
.vide{
  text-align:center;padding:40px 20px;color:var(--gris);
}
.vide-emoji{font-size:48px;display:block;margin-bottom:12px;}
.vide-txt{font-size:14px;font-style:italic;}

/* MODAL */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(42,26,62,.55);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.modal{
  background:var(--blanc);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;padding:20px 20px 36px;
  max-height:92vh;overflow-y:auto;
  animation:slideUp .25s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-hdr-titre{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.modal-close{
  background:var(--gris-pale);border:none;border-radius:50%;
  width:32px;height:32px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--gris);
}
.form-row{margin-bottom:14px;}
.form-label{
  display:block;font-size:12px;font-weight:600;color:var(--gris);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;
}
.form-input{
  width:100%;padding:10px 12px;border-radius:10px;
  border:1.5px solid var(--mauve-mid);font-size:14px;
  font-family:'DM Sans',sans-serif;color:var(--texte);
  background:var(--blanc);outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--mauve);}
textarea.form-input{resize:vertical;min-height:120px;}

/* Toggle importance */
.imp-toggle{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--mauve-mid);background:var(--blanc);
  cursor:pointer;transition:all .15s;
}
.imp-toggle.actif{background:var(--or-pale);border-color:var(--or-mid);}
.imp-toggle input{display:none;}
.imp-toggle-ico{font-size:20px;}
.imp-toggle-txt{font-size:14px;font-weight:600;color:var(--texte);}
.imp-toggle-sub{font-size:11px;color:var(--gris);}

.btn-sauver{
  width:100%;padding:14px;margin-top:8px;
  background:linear-gradient(135deg,var(--mauve-f),var(--mauve));
  border:none;border-radius:12px;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:opacity .15s;
}
.btn-sauver:active{opacity:.85;}

/* MODAL COURSES */
#modal-courses{
  display:none;position:fixed;inset:0;
  background:rgba(42,26,62,.55);z-index:200;
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.courses-ajout-ligne{
  display:flex;gap:8px;
}
.courses-ajout-btn{
  width:44px;height:44px;flex-shrink:0;
  background:var(--mauve);border:none;border-radius:10px;
  color:#fff;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.courses-ajout-btn:active{opacity:.8;}
.courses-items-liste{
  min-height:40px;max-height:260px;overflow-y:auto;
  margin-bottom:12px;display:flex;flex-direction:column;gap:4px;
}
.course-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;background:var(--gris-pale);border-radius:10px;
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.course-item-check{
  width:20px;height:20px;accent-color:var(--vert);cursor:pointer;flex-shrink:0;
}
.course-item-label{
  flex:1;font-size:14px;color:var(--texte);cursor:pointer;
}
.course-item-label.coche{
  text-decoration:line-through;color:var(--gris);
}
.course-item-del{
  background:none;border:none;font-size:15px;cursor:pointer;
  color:var(--gris);padding:2px;border-radius:6px;
  transition:background .12s;
}
.course-item-del:active{background:var(--rouge-pale);}
.courses-vide{
  text-align:center;font-size:13px;color:var(--gris);
  font-style:italic;padding:12px 0;
}
#undo-bar{
  display:none;position:fixed;bottom:88px;left:50%;
  transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;
  background:#2a1a3e;color:#fff;border-radius:12px;
  padding:12px 16px;z-index:300;
  align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
#undo-bar span{font-size:13px;}
#undo-bar button{
  background:var(--mauve-pale);border:none;border-radius:8px;
  padding:6px 12px;font-size:13px;font-weight:700;color:var(--mauve-f);cursor:pointer;
}

/* NAV BAS */
.nav-bas{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--blanc);
  border-top:1px solid #e8e0f5;display:flex;
  justify-content:space-around;padding:8px 0 12px;
  z-index:100;box-shadow:0 -2px 16px rgba(120,80,180,.07);
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  text-decoration:none;color:var(--gris);font-size:10px;font-weight:500;
  padding:4px 8px;border-radius:10px;
  transition:color .2s,background .2s;-webkit-tap-highlight-color:transparent;
}
.nav-item.actif,.nav-item:active{color:var(--mauve-f);background:var(--mauve-pale);}
.nav-item svg{width:22px;height:22px;stroke-width:1.7;}
</style>
</head>
<body>

<header class="header">
  <a href="index.html">←</a>
  <div class="header-titre">Notes<span>Céline & Yves</span></div>
  <button class="header-btn" onclick="ouvrirCourses()" title="Liste de courses" style="margin-right:4px;font-size:18px;">🛒</button>
  <button class="header-btn" onclick="ouvrirFormulaire()" title="Nouvelle note">+</button>
</header>

<!-- FILTRES -->
<div class="filtres">
  <button class="filtre-btn actif" id="f-toutes" onclick="setFiltre('toutes')">📋 Toutes</button>
  <button class="filtre-btn imp" id="f-importantes" onclick="setFiltre('importantes')">📌 Importantes</button>
  <button class="filtre-btn" id="f-normales" onclick="setFiltre('normales')">📄 Normales</button>
</div>

<!-- LISTE DES NOTES -->
<div class="notes-liste" id="notes-liste">
  <div class="vide"><span class="vide-emoji">📝</span><span class="vide-txt">Chargement…</span></div>
</div>

<!-- UNDO -->
<div id="undo-bar">
  <span>Note supprimée</span>
  <button onclick="annulerSuppr()">↩ Annuler</button>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)fermerModal()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-hdr-titre" id="form-titre">Nouvelle note</span>
      <button class="modal-close" onclick="fermerModal()">✕</button>
    </div>

    <!-- Titre -->
    <div class="form-row">
      <label class="form-label">Titre *</label>
      <input id="note-titre" class="form-input" type="text" placeholder="Ex : Liste courses, Idée vacances…">
    </div>

    <!-- Contenu -->
    <div class="form-row">
      <label class="form-label">Contenu *</label>
      <textarea id="note-contenu" class="form-input" rows="5"
        placeholder="Écrivez votre note ici…"></textarea>
    </div>

    <!-- Importance -->
    <div class="form-row">
      <label class="form-label">Importance</label>
      <label class="imp-toggle" id="imp-toggle" onclick="toggleImportance()">
        <input type="checkbox" id="note-imp">
        <span class="imp-toggle-ico" id="imp-ico">📄</span>
        <div>
          <div class="imp-toggle-txt" id="imp-txt">Note normale</div>
          <div class="imp-toggle-sub" id="imp-sub">Cliquer pour marquer comme importante</div>
        </div>
      </label>
    </div>

    <button class="btn-sauver" onclick="sauvegarderNote()">💾 Enregistrer</button>
  </div>
</div>

<!-- MODAL COURSES -->
<div id="modal-courses" onclick="if(event.target===this)fermerCourses()">
  <div class="modal" id="modal-courses-inner">
    <div class="modal-hdr">
      <span class="modal-hdr-titre">🛒 Liste de courses</span>
      <button class="modal-close" onclick="fermerCourses()">✕</button>
    </div>

    <!-- Nom de la liste -->
    <div class="form-row">
      <label class="form-label">Nom de la liste</label>
      <input id="courses-nom" class="form-input" type="text"
        placeholder="Ex : Courses semaine, Marché samedi…"
        value="Courses du jour">
    </div>

    <!-- Ajout rapide d'articles -->
    <div class="form-row">
      <label class="form-label">Articles</label>
      <div class="courses-ajout-ligne">
        <input id="courses-inp" class="form-input" type="text"
          placeholder="Ajouter un article…"
          onkeydown="if(event.key==='Enter'){ajouterArticle();event.preventDefault();}">
        <button class="courses-ajout-btn" onclick="ajouterArticle()">+</button>
      </div>
    </div>

    <!-- Liste des articles -->
    <div id="courses-items-liste" class="courses-items-liste"></div>

    <button class="btn-sauver" onclick="sauvegarderCourses()">💾 Enregistrer la liste</button>
  </div>
</div>

<!-- NAV BAS -->
<nav class="nav-bas">
  <a href="index.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9 21V12h6v9" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>Accueil
  </a>
  <a href="agenda.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <rect x="3" y="4" width="18" height="18" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 2v4M8 2v4M3 10h18" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>Agenda
  </a>
  <a href="depenses.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke-linecap="round"/>
      <path d="M12 6v2m0 8v2M9 9.5h4.5a1.5 1.5 0 110 3h-3a1.5 1.5 0 000 3H15" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>Dépenses
  </a>
  <a href="notes.html" class="nav-item actif">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>Notes
  </a>
  <a href="contacts.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="9" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round" stroke-linejoin="round"/>

<script>
/* ── Firebase ───────────────────────────────── */
firebase.initializeApp({
  apiKey: "AIzaSyB1cKDJSyHoUcq07yL8k7t_q3WNZ4ZaBJw",
  authDomain: "celine-yves.firebaseapp.com",
  databaseURL: "https://celine-yves-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "celine-yves",
  storageBucket: "celine-yves.firebasestorage.app",
  messagingSenderId: "1024885005035",
  appId: "1:1024885005035:web:fd92a0a8fc07eb78a17cae"
});
var db = firebase.database();

/* ── État ──────────────────────────────────── */
var allNotes = {};
var editKey  = null;
var lastDel  = null;
var filtre   = 'toutes';
var expanded = {}; // { key: true } si note dépliée

/* ── Listener Firebase ─────────────────────── */
db.ref("notes").on("value", function(s) {
  allNotes = s.val() || {};
  renderNotes();
});

/* ── Filtre ────────────────────────────────── */
function setFiltre(f) {
  filtre = f;
  ['toutes','importantes','normales'].forEach(function(id) {
    var btn = document.getElementById('f-'+id);
    btn.classList.toggle('actif', id === f);
  });
  renderNotes();
}

/* ── Rendu liste ───────────────────────────── */
function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  var j = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'][d.getDay()];
  var m = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'][d.getMonth()];
  return j+' '+d.getDate()+' '+m+' '+d.getFullYear();
}

function renderNotes() {
  var notes = Object.entries(allNotes)
    .filter(function(e) {
      if (e[1].supprime) return false;
      if (filtre === 'importantes') return e[1].importante;
      if (filtre === 'normales')    return !e[1].importante;
      return true;
    })
    .sort(function(a, b) {
      // Importantes en premier, puis par date modif décroissante
      if (a[1].importante !== b[1].importante)
        return a[1].importante ? -1 : 1;
      return (b[1].modifiedAt||'').localeCompare(a[1].modifiedAt||'');
    });

  var el = document.getElementById('notes-liste');

  if (notes.length === 0) {
    el.innerHTML = '<div class="vide"><span class="vide-emoji">' +
      (filtre==='importantes'?'📌':'📝') +
      '</span><span class="vide-txt">' +
      (filtre==='importantes'?'Aucune note importante':'Aucune note pour l\'instant') +
      '</span></div>';
    return;
  }

  el.innerHTML = notes.map(function(e) {
    var key = e[0], n = e[1];
    var imp = n.importante;
    var isExp = !!expanded[key];
    var contenu = n.contenu || '';
    var long = contenu.length > 180 || contenu.split('\n').length > 3;

    return '<div class="note-carte' + (imp?' importante':'') + '" id="nc-'+key+'">' +
      '<div class="note-header">' +
        '<span class="note-icone">' + (imp?'📌':'📄') + '</span>' +
        '<div class="note-info">' +
          '<div class="note-titre-ligne">' +
            '<span class="note-titre">' + escHtml(n.titre||'Sans titre') + '</span>' +
            (imp ? '<span class="badge-imp">Important</span>' : '') +
          '</div>' +
          '<div class="note-date">' + fmtDate(n.modifiedAt||n.createdAt) + '</div>' +
        '</div>' +
        '<div class="note-actions">' +
          '<button class="btn-icon" onclick="ouvrirEdition(\''+key+'\')" title="Modifier">✏️</button>' +
          '<button class="btn-icon" onclick="supprimerNote(\''+key+'\')" title="Supprimer">🗑️</button>' +
        '</div>' +
      '</div>' +
      '<div class="note-contenu' + (!isExp && long ? ' tronque' : '') + '">' +
        escHtml(contenu) +
      '</div>' +
      (long && !isExp ?
        '<button class="note-lire-plus" onclick="toggleExpand(\''+key+'\')">▼ Lire la suite</button>' : '') +
      (long && isExp ?
        '<button class="note-lire-plus" onclick="toggleExpand(\''+key+'\')">▲ Réduire</button>' : '') +
    '</div>';
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleExpand(key) {
  expanded[key] = !expanded[key];
  renderNotes();
}

/* ── Formulaire ────────────────────────────── */
function ouvrirFormulaire() {
  editKey = null;
  document.getElementById('form-titre').textContent = 'Nouvelle note';
  document.getElementById('note-titre').value   = '';
  document.getElementById('note-contenu').value = '';
  document.getElementById('note-imp').checked   = false;
  majToggleImp(false);
  document.getElementById('modal-overlay').style.display = 'flex';
  setTimeout(function(){ document.getElementById('note-titre').focus(); }, 200);
}

function ouvrirEdition(key) {
  var n = allNotes[key];
  if (!n) return;
  editKey = key;
  document.getElementById('form-titre').textContent    = 'Modifier la note';
  document.getElementById('note-titre').value          = n.titre   || '';
  document.getElementById('note-contenu').value        = n.contenu || '';
  document.getElementById('note-imp').checked          = !!n.importante;
  majToggleImp(!!n.importante);
  document.getElementById('modal-overlay').style.display = 'flex';
}

function fermerModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  editKey = null;
}

function toggleImportance() {
  var cb = document.getElementById('note-imp');
  cb.checked = !cb.checked;
  majToggleImp(cb.checked);
}

function majToggleImp(imp) {
  var tog = document.getElementById('imp-toggle');
  var ico = document.getElementById('imp-ico');
  var txt = document.getElementById('imp-txt');
  var sub = document.getElementById('imp-sub');
  tog.classList.toggle('actif', imp);
  ico.textContent = imp ? '📌' : '📄';
  txt.textContent = imp ? 'Note importante' : 'Note normale';
  sub.textContent = imp ? 'Cliquer pour passer en normale' : 'Cliquer pour marquer comme importante';
}

function sauvegarderNote() {
  var titre   = document.getElementById('note-titre').value.trim();
  var contenu = document.getElementById('note-contenu').value.trim();
  if (!titre)   { alert('Le titre est obligatoire'); return; }
  if (!contenu) { alert('Le contenu est obligatoire'); return; }

  var data = {
    titre:      titre,
    contenu:    contenu,
    importante: document.getElementById('note-imp').checked,
    modifiedAt: new Date().toISOString(),
    supprime:   false
  };

  if (editKey) {
    allNotes[editKey] = Object.assign(allNotes[editKey]||{}, data);
    db.ref("notes/"+editKey).update(data);
  } else {
    data.createdAt = new Date().toISOString();
    var ref = db.ref("notes").push();
    allNotes[ref.key] = data;
    ref.set(data);
  }
  fermerModal();
  renderNotes();
}

/* ── Suppression + undo ────────────────────── */
function supprimerNote(key) {
  var n = allNotes[key];
  if (!n) return;
  lastDel = { key: key, data: Object.assign({}, n) };
  allNotes[key].supprime = true;
  renderNotes();
  db.ref("notes/"+key).update({ supprime: true, suppressAt: new Date().toISOString() });
  var bar = document.getElementById('undo-bar');
  bar.style.display = 'flex';
  clearTimeout(window._ut);
  window._ut = setTimeout(function() { bar.style.display='none'; lastDel=null; }, 6000);
}

/* ── MODAL COURSES ─────────────────────────── */
var coursesArticles = []; // [{nom, coche}]

function ouvrirCourses() {
  coursesArticles = [];
  document.getElementById('courses-nom').value = 'Courses du ' + fmtDateCourt(new Date());
  document.getElementById('courses-inp').value = '';
  renderCoursesList();
  document.getElementById('modal-courses').style.display = 'flex';
  setTimeout(function(){ document.getElementById('courses-inp').focus(); }, 200);
}

function fermerCourses() {
  document.getElementById('modal-courses').style.display = 'none';
  coursesArticles = [];
}

function fmtDateCourt(d) {
  return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
}

function ajouterArticle() {
  var inp = document.getElementById('courses-inp');
  var nom = inp.value.trim();
  if (!nom) return;
  coursesArticles.push({ nom: nom, coche: false });
  inp.value = '';
  renderCoursesList();
  inp.focus();
}

function toggleArticle(i) {
  coursesArticles[i].coche = !coursesArticles[i].coche;
  renderCoursesList();
}

function supprimerArticle(i) {
  coursesArticles.splice(i, 1);
  renderCoursesList();
}

function renderCoursesList() {
  var el = document.getElementById('courses-items-liste');
  if (coursesArticles.length === 0) {
    el.innerHTML = '<div class="courses-vide">Ajoutez des articles avec le champ ci-dessus</div>';
    return;
  }
  el.innerHTML = coursesArticles.map(function(a, i) {
    return '<div class="course-item">' +
      '<input type="checkbox" class="course-item-check"' + (a.coche?' checked':'') +
        ' onchange="toggleArticle('+i+')">' +
      '<span class="course-item-label' + (a.coche?' coche':'') + '" onclick="toggleArticle('+i+')">' +
        escHtml(a.nom) +
      '</span>' +
      '<button class="course-item-del" onclick="supprimerArticle('+i+')" title="Retirer">✕</button>' +
    '</div>';
  }).join('');
}

function sauvegarderCourses() {
  if (coursesArticles.length === 0) { alert('Ajoutez au moins un article'); return; }
  var nom  = document.getElementById('courses-nom').value.trim() || 'Liste de courses';
  // Construire le contenu texte de la note
  var contenu = coursesArticles.map(function(a) {
    return (a.coche ? '✅ ' : '☐ ') + a.nom;
  }).join('\n');

  var data = {
    titre:      '🛒 ' + nom,
    contenu:    contenu,
    importante: true,   // une liste de courses = toujours en avant
    typeCourses: true,  // marqueur pour l'accueil
    createdAt:  new Date().toISOString(),
    modifiedAt: new Date().toISOString(),
    supprime:   false
  };

  var ref = db.ref("notes").push();
  allNotes[ref.key] = data;
  ref.set(data);

  fermerCourses();
  renderNotes();
  setFiltre('importantes');
}

function annulerSuppr() {
  if (!lastDel) return;
  allNotes[lastDel.key].supprime = false;
  renderNotes();
  db.ref("notes/"+lastDel.key).update({ supprime: false, suppressAt: null });
  document.getElementById('undo-bar').style.display = 'none';
  lastDel = null;
}
</script>
</body>
</html>
