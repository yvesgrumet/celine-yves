    0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",
    51:"🌦️",53:"🌦️",55:"🌧️",61:"🌧️",63:"🌧️",65:"🌧️",

  async function loadMeteoVille(ville) {
    const el = document.getElementById(ville.id);
    try {
      const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${ville.lat}&longitude=${ville.lon}` +
        `&current=temperature_2m,weathercode&timezone=Europe/Paris`
      );
      const d = await r.json();
      const temp = Math.round(d.current.temperature_2m);
      const ic   = ICONES_METEO[d.current.weathercode] || "🌡️";
      el.innerHTML = `<span class="meteo-ville">${ville.nom}</span><span class="meteo-val">${ic} ${temp}°C</span>`;
    } catch(e) {
      el.innerHTML = `<span class="meteo-ville">${ville.nom}</span><span class="meteo-val">🌡️ —</span>`;
    }
  }

  async function loadMeteo() {
    await Promise.all(VILLES.map(loadMeteoVille));
  }

  /* ── Date & Heure en temps réel ───────────────────── */
  function majDateHeure() {
    const now = new Date();
    const jours = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
    const mois  = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
    const j = jours[now.getDay()];
    const d = now.getDate();
    const m = mois[now.getMonth()];
    const a = now.getFullYear();
    const h = String(now.getHours()).padStart(2,"0");
    const mn = String(now.getMinutes()).padStart(2,"0");

    document.getElementById("date-txt").textContent = `${j} ${d} ${m} ${a}`;
    document.getElementById("heure-txt").textContent = `${h}:${mn}`;

    const fete = feteJour();
    const el = document.getElementById("fete-txt");
    if (fete) { el.innerHTML = `✨ <strong>${fete}</strong>`; el.style.display="inline"; }
    else       { el.style.display="none"; }
    // Afficher date + fête sur la même ligne
    const dateTxt = document.getElementById("date-txt");
    dateTxt.textContent = `${j} ${d} ${m} ${a}`;
  }
  setInterval(majDateHeure, 1000);
  majDateHeure();

  /* ── Anniversaires ────────────────────────────────── */
  function checkAnniversaires() {
    const now = new Date();
    const mmdd = String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
    const r = ref(db, "contacts");
    onValue(r, snap => {
      const data = snap.val() || {};
      const anniversaires = [];
      Object.values(data).forEach(c => {
        if (c.dateNaissance) {
          const dn = c.dateNaissance.slice(5); // MM-DD
          if (dn === mmdd) anniversaires.push(c.prenom + " " + (c.nom||""));
        }
      });
      // aussi famille
      const rf = ref(db, "famille");
      onValue(rf, sf => {
        const fam = sf.val() || {};
        Object.values(fam).forEach(f => {
          if (f.dateNaissance) {
            const dn = f.dateNaissance.slice(5);
            if (dn === mmdd) anniversaires.push(f.prenom || f.nom || "");
          }
        });
        const el = document.getElementById("anniversaires-bloc");
        if (anniversaires.length > 0) {
          el.innerHTML = anniversaires.map(a => `🎂 Joyeux anniversaire <strong>${a}</strong> !`).join("<br>");
          el.style.display = "block";
        } else {
          el.style.display = "none";
        }
      }, { onlyOnce: true });
    }, { onlyOnce: true });
  }

  /* ── Événements du jour ───────────────────────────── */
  function loadEvenementsJour() {
    const today = todayStr();
    const r = ref(db, "evenements");
    onValue(r, snap => {
      const data = snap.val() || {};
      const evJour = Object.entries(data)
        .filter(([k,v]) => v.date === today && !v.supprime)
        .map(([k,v]) => v)
        .sort((a,b) => (a.heure||"99:99").localeCompare(b.heure||"99:99"));

      const el = document.getElementById("events-jour");
      const badge = document.getElementById("badge-count");
      badge.textContent = evJour.length;

      if (evJour.length === 0) {
        el.innerHTML = `<p class="rien">Aucun événement aujourd'hui</p>`;
        return;
      }
      el.innerHTML = evJour.map(ev => {
        const h = ev.heure ? `<span class="ev-heure">${ev.heure}</span>` : "";
        const qui = ev.qui ? `<span class="ev-qui">${ev.qui}</span>` : "";
        return `<div class="ev-item">${h}<span class="ev-titre">${ev.titre}</span>${qui}</div>`;
      }).join("");
    });
  }

  /* ── Prochains événements (7 jours) ──────────────── */
  function loadProchains() {
    const today = todayStr();
    const dans7 = new Date(); dans7.setDate(dans7.getDate()+7);
    const fin7  = dans7.toISOString().slice(0,10);
    // Catégories récurrentes à exclure des prochains événements
    const CATS_RECURRENTES = ["travail","sport","valentin","ecole"];
    const r = ref(db,"evenements");
    onValue(r, snap => {
      const data = snap.val() || {};
      const prochains = Object.entries(data)
        .filter(([k,v]) =>
          v.date > today &&
          v.date <= fin7 &&
          !v.supprime &&
          !CATS_RECURRENTES.includes(v.categorie)
        )
        .map(([k,v]) => v)
        .sort((a,b) => a.date.localeCompare(b.date));

      const el = document.getElementById("prochains-liste");
      if (prochains.length === 0) {
        el.innerHTML = `<p class="rien">Rien dans les 7 prochains jours</p>`;
        return;
      }
      const joursF = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
      el.innerHTML = prochains.slice(0,5).map(ev => {
        const d = new Date(ev.date+"T12:00:00");
        const label = `${joursF[d.getDay()]} ${d.getDate()}`;
        const h = ev.heure ? ` ${ev.heure}` : "";
        const qui = ev.qui ? `<span class="prochain-qui">${ev.qui}</span>` : "";
        return `<div class="prochain-item">
          <span class="prochain-date">${label}</span>
          <span class="prochain-titre">${ev.titre}${h}</span>
          ${qui}
        </div>`;
      }).join("");
    });
  }

  /* ── Dernière liste de courses ────────────────────── */
  function loadDerniereListe() {
    const r = ref(db,"listes-courses");
    onValue(r, snap => {
      const data = snap.val() || {};
      const listes = Object.entries(data)
        .filter(([k,v]) => !v.supprime)
        .sort((a,b) => (b[1].createdAt||"").localeCompare(a[1].createdAt||""));

      const el = document.getElementById("courses-bloc");
      const titre = document.getElementById("courses-titre");
      if (listes.length === 0) { el.style.display="none"; return; }

      const [key, liste] = listes[0];
      titre.textContent = liste.nom || "Liste de courses";
      const items = Object.values(liste.items || {}).filter(i => !i.coche);
      const cochés = Object.values(liste.items || {}).filter(i => i.coche);

      document.getElementById("courses-items").innerHTML =
        items.map(i => `<span class="course-tag">${i.nom}</span>`).join("") +
        cochés.map(i => `<span class="course-tag fait">${i.nom}</span>`).join("");

      el.style.display = "block";
    });
  }

  /* ── Note importante ─────────────────────────────── */
  function loadNoteImportante() {
    const r = ref(db,"notes");
    onValue(r, snap => {
      const data = snap.val() || {};
      const importantes = Object.values(data)
        .filter(n => n.importante && !n.supprime)
        .sort((a,b) => (b.modifiedAt||"").localeCompare(a.modifiedAt||""));

      const el = document.getElementById("note-bloc");
      if (importantes.length === 0) { el.style.display="none"; return; }
      const n = importantes[0];
      document.getElementById("note-contenu").textContent = n.contenu || "";
      el.style.display = "block";
    });
  }

  /* ── Nouveaux événements + "vu par" ──────────────── */
  let _accesPersonnes = [];

  onValue(ref(db, "acces"), snapA => {
    _accesPersonnes = Object.values(snapA.val() || {})
      .filter(p => p.active !== false)
      .map(p => p.nom)
      .sort();
    renderNouveaux();
  });

  onValue(ref(db, "evenements"), () => renderNouveaux());

  function renderNouveaux() {
    const snap = _lastEvSnap;
    if (!snap) return;
    const evts = snap.val() || {};
    const nouveaux = Object.entries(evts)
      .filter(([, v]) => v.isNew && !v.supprime)
      .sort((a, b) => (b[1].createdAt || "").localeCompare(a[1].createdAt || ""));

    const bloc = document.getElementById("nouveaux-bloc");
    const el   = document.getElementById("nouveaux-liste");
    if (!bloc || !el) return;

    const lignes = nouveaux.map(([key, ev]) => {
      const vus = ev.vus || {};
      const tousVu = _accesPersonnes.length > 0 && _accesPersonnes.every(p => vus[sanitizeKey(p)]);
      if (tousVu) {
        update(ref(db, `evenements/${key}`), { isNew: false });
        return "";
      }
      const d = new Date((ev.date || new Date().toISOString().slice(0,10)) + "T12:00:00");
      const jours = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
      const dateLabel = `${jours[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
      const vuBtns = _accesPersonnes.map(p => {
        const k = sanitizeKey(p);
        const vu = vus[k] === true;
        return `<button class="vu-btn${vu ? " vu" : ""}" onclick="marquerVu('${key}','${p}',${vu})" title="${vu ? p+' a vu' : 'Marquer vu par '+p}">
          ${vu ? "✓" : "○"} ${p}
        </button>`;
      }).join("");
      return `<div class="nouveau-item">
        <div class="nouveau-info">
          <span class="nouveau-date">${dateLabel}</span>
          <span class="nouveau-titre">${escHtml(ev.titre || "")}</span>
          ${ev.qui ? `<span class="nouveau-qui">${ev.qui}</span>` : ""}
        </div>
        <div class="vu-btns">${vuBtns || '<span style="font-size:12px;color:var(--gris);font-style:italic">Aucun accès configuré — <a href="acces.html" style="color:#9b6fc4">Configurer</a></span>'}</div>
      </div>`;
    }).filter(Boolean).join("");

    if (!lignes) { bloc.style.display = "none"; return; }
    bloc.style.display = "block";
    el.innerHTML = lignes;
  }

  let _lastEvSnap = null;
  onValue(ref(db, "evenements"), snap => {
    _lastEvSnap = snap;
    renderNouveaux();
  });

  function sanitizeKey(name) {
    return name.replace(/[.#$/\[\]]/g, "_");
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  window.marquerVu = function(evKey, personne, dejaVu) {
    const k = sanitizeKey(personne);
    const maj = {};
    maj[`vus/${k}`] = !dejaVu;
    update(ref(db, `evenements/${evKey}`), maj);
  };

  /* ── Lancement ───────────────────────────────────── */
  loadMeteo();
  checkAnniversaires();
  loadEvenementsJour();
  loadProchains();
  loadDerniereListe();
  loadNoteImportante();

  /* ── Badge + Notifications ────────────────── */
  onValue(ref(db,"evenements"), snap => {
    const evts = snap.val() || {};
    const today = new Date().toISOString().slice(0,10);
    const evJour = Object.values(evts).filter(v => !v.supprime && v.date === today);
    const count  = evJour.length;

    // Badge numérique sur le cœur du milieu
    const badge = document.getElementById("badge-count");
    if (badge) badge.textContent = count;

    // Badge icône PWA
    if (window.majBadge) window.majBadge(count);

    // Notification si nouvelle entrée depuis la dernière visite
    const lastSeen = localStorage.getItem('lastSeen_ev') || '';
    const nouvelles = Object.values(evts).filter(v =>
      !v.supprime && v.createdAt && v.createdAt > lastSeen
    );
    if (nouvelles.length > 0 && lastSeen && window.envoyerNotification) {
      const n = nouvelles[0];
      window.envoyerNotification(
        '📅 Nouvel événement — Céline & Yves',
        (n.titre||'Nouveau') + (n.date?' le '+n.date.split('-').reverse().join('/'):'' ),
        '/agenda.html'
      );
    }
    localStorage.setItem('lastSeen_ev', new Date().toISOString());
  });
</script>
